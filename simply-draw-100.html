<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>✦ Simply Draw</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0e0c28;--card:#181540;--card2:#201d50;--pu:#7c3aed;--tl:#14b8a6;--ye:#fbbf24;--wh:#f0eeff;--mu:rgba(240,238,255,0.42);--bd:rgba(255,255,255,0.08)}
html,body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--wh);height:100%;overflow:hidden}
.app{display:flex;height:100vh}
.side{width:70px;background:rgba(255,255,255,.03);border-right:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;flex-shrink:0}
.av{width:46px;height:46px;border-radius:50%;font-size:24px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;cursor:pointer;background:rgba(255,255,255,.08)}
.nb{width:56px;padding:9px 0;border-radius:13px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-size:9px;color:rgba(255,255,255,.32);background:none;border:none;font-family:'Nunito',sans-serif;font-weight:700;transition:all .18s}
.nb svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2}
.nb.on{background:white;color:#2d1a6e}
.nb:hover:not(.on){background:rgba(255,255,255,.07);color:var(--wh)}
.body{flex:1;overflow-y:auto;overflow-x:hidden;position:relative}
.body::-webkit-scrollbar{width:3px}
.body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.pad{padding:16px 14px 28px}

/* SEARCH */
.srch-w{position:relative;margin-bottom:13px}
.srch{width:100%;padding:12px 44px 12px 16px;background:var(--card2);border:1.5px solid var(--bd);border-radius:50px;color:var(--wh);font-family:'Nunito',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.srch:focus{border-color:var(--pu)}
.srch::placeholder{color:var(--mu)}
.srch-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:var(--pu);border:none;cursor:pointer;font-size:15px;color:white;transition:all .2s}
.srch-btn:hover{background:#6d28d9}

/* AI PANEL */
.ai-box{background:linear-gradient(135deg,rgba(124,58,237,.16),rgba(20,184,166,.1));border:1px solid rgba(124,58,237,.3);border-radius:16px;padding:14px;margin-bottom:14px;display:none}
.ai-lbl{font-size:11px;font-weight:800;color:#a78bfa;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.ai-desc{font-size:12px;color:var(--mu);margin-bottom:10px;line-height:1.4}
.ai-row{display:flex;gap:8px;align-items:center}
.ai-in{flex:1;padding:10px 14px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:50px;color:var(--wh);font-family:'Nunito',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.ai-in:focus{border-color:var(--pu)}
.ai-in::placeholder{color:var(--mu);font-size:12px}
.ai-btn{padding:10px 16px;border-radius:50px;background:var(--pu);border:none;color:white;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:all .2s;flex-shrink:0}
.ai-btn:hover:not(:disabled){background:#6d28d9}
.ai-btn:disabled{opacity:.5;cursor:not-allowed}
.spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.25);border-top-color:white;border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.ai-status{margin-top:9px;font-size:11px;color:var(--mu);display:flex;align-items:center;gap:7px}
.ai-error{margin-top:8px;font-size:11px;color:#fca5a5;display:none}

/* LEVEL TABS */
.lvls{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:3px}
.lvls::-webkit-scrollbar{display:none}
.lv{padding:6px 15px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;border:1.5px solid rgba(255,255,255,.15);background:transparent;color:var(--mu);transition:all .18s;flex-shrink:0}
.lv.on{color:white}
.lv[data-v="Todo"].on{background:var(--pu);border-color:var(--pu)}
.lv[data-v="Fácil"].on{background:#16a34a;border-color:#16a34a}
.lv[data-v="Medio"].on{background:#d97706;border-color:#d97706}
.lv[data-v="Difícil"].on{background:#dc2626;border-color:#dc2626}
.lv[data-v="Experto"].on{background:#7c3aed;border-color:#5b21b6}

/* CAT FILTERS */
.cats{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:3px}
.cats::-webkit-scrollbar{display:none}
.ct{padding:5px 13px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid rgba(255,255,255,.1);background:transparent;color:var(--mu);transition:all .18s;flex-shrink:0}
.ct.on{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);color:var(--wh)}

.sh{font-size:10px;font-weight:800;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 9px;display:flex;align-items:center;gap:8px;grid-column:1/-1}
.sh::after{content:'';flex:1;height:1px;background:var(--bd)}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dc{border-radius:14px;overflow:hidden;cursor:pointer;background:var(--card);border:1.5px solid var(--bd);transition:all .2s;position:relative}
.dc:hover{transform:translateY(-2px);border-color:rgba(124,58,237,.45);box-shadow:0 6px 20px rgba(124,58,237,.15)}
.dc:active{transform:scale(.97)}
.dc-img{height:115px;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#1a1650,#141240);overflow:hidden}
.dc-img svg{max-width:88px;max-height:88px;width:88px;height:88px}
.dc-body{padding:9px 11px 11px}
.dc-name{font-size:13px;font-weight:800;margin-bottom:4px}
.dc-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.bv{font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;color:white}
.bf{background:#16a34a}.bm{background:#d97706}.bd2{background:#dc2626}.be{background:#7c3aed}
.dc-s{font-size:10px;color:var(--mu)}
.done-b{position:absolute;top:7px;left:7px;width:22px;height:22px;border-radius:50%;background:var(--tl);display:flex;align-items:center;justify-content:center;font-size:10px;color:white;font-weight:900}
.ai-b{position:absolute;top:7px;right:7px;background:linear-gradient(135deg,#7c3aed,#0d9488);border-radius:50px;padding:2px 7px;font-size:8px;font-weight:800;color:white}
.empty{text-align:center;padding:32px 16px;color:var(--mu);grid-column:1/-1}
.empty .ei{font-size:42px;margin-bottom:10px}
.empty p{font-size:13px;line-height:1.5}

/* LESSON */
.lesson{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;z-index:10}
.lhdr{background:var(--tl);padding:13px 15px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.lbk{background:none;border:none;color:white;font-size:22px;cursor:pointer;line-height:1;padding:0 3px}
.lhdr h2{font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;flex:1;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srow{display:flex;padding:11px 13px 7px;overflow-x:auto;flex-shrink:0;background:rgba(255,255,255,.03);border-bottom:1px solid var(--bd);scrollbar-width:none}
.srow::-webkit-scrollbar{display:none}
.sn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex-shrink:0;position:relative}
.sn+.sn{margin-left:40px}
.sn+.sn::before{content:'';position:absolute;left:-40px;top:22px;width:40px;height:2px;background:rgba(255,255,255,.1)}
.sn.dn+.sn::before{background:var(--tl)}
.sc{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;border:2.5px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);z-index:1;position:relative;font-family:'Nunito',sans-serif}
.sc.dn{border-color:var(--tl);background:rgba(20,184,166,.16)}
.sc.cr{border-color:var(--ye);background:rgba(251,191,36,.1);animation:gl 2s infinite}
@keyframes gl{0%,100%{box-shadow:0 0 12px rgba(251,191,36,.25)}50%{box-shadow:0 0 22px rgba(251,191,36,.6)}}
.sl{font-size:8px;color:rgba(255,255,255,.35);text-align:center;max-width:44px;line-height:1.2;font-weight:700}
.sn.cr .sl{color:var(--ye)}.sn.dn .sl{color:var(--tl)}
.dots{display:flex;justify-content:center;gap:4px;padding:4px 0;flex-shrink:0}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.14);transition:all .3s}
.dot.dn{background:var(--tl)}.dot.cr{background:var(--ye);width:16px;border-radius:3px}
.lcont{flex:1;overflow-y:auto;padding:11px 13px;display:flex;flex-direction:column;gap:10px}
.lcont::-webkit-scrollbar{width:3px}
.lcont::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.vc{background:white;border-radius:18px;overflow:hidden;box-shadow:0 5px 22px rgba(0,0,0,.22);position:relative}
.sbg{position:absolute;top:10px;left:10px;z-index:10;background:var(--pu);color:white;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;font-family:'Nunito',sans-serif}
.snb{position:absolute;top:10px;right:10px;z-index:10;background:rgba(0,0,0,.62);color:white;padding:4px 10px;border-radius:15px;font-size:10px;font-weight:800;font-family:'Nunito',sans-serif}
.vsvg{width:100%;background:#f8f7fd;display:flex;align-items:center;justify-content:center;padding:14px;min-height:230px}
.vsvg svg{width:100%;max-width:270px;height:210px}
.vhint{padding:13px 15px;background:white;border-top:1px solid #ebe8f8;display:flex;align-items:flex-start;gap:9px}
.hi{font-size:20px;flex-shrink:0;margin-top:1px}
.ht{font-size:13px;color:#333;line-height:1.5;font-weight:600}
.ht b{color:#6d28d9}
.lfoot{padding:9px 13px 18px;flex-shrink:0;display:flex;flex-direction:column;gap:5px}
.scl{text-align:center;font-size:11px;color:var(--mu)}
.btn-n{width:100%;padding:15px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;cursor:pointer;border:none;background:var(--ye);color:#1a0a00;transition:all .18s}
.btn-n:hover{background:#fcd34d}
.btn-f{background:var(--tl);color:white}

/* DONE */
.done-ov{position:absolute;inset:0;background:rgba(14,12,40,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;gap:13px;padding:28px}
.do-em{font-size:70px;animation:bo .6s ease infinite alternate}
@keyframes bo{0%{transform:translateY(0)}100%{transform:translateY(-10px)}}
.do-t{font-size:24px;font-weight:900;text-align:center}
.do-s{font-size:13px;color:var(--mu);text-align:center;line-height:1.5}
.do-bs{display:flex;flex-direction:column;gap:9px;width:100%;max-width:280px;margin-top:6px}
.bdo1{width:100%;padding:14px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;border:none;background:var(--ye);color:#1a0a00;cursor:pointer}
.bdo2{width:100%;padding:14px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;border:1.5px solid rgba(255,255,255,.22);background:transparent;color:white;cursor:pointer}

/* JOURNAL */
.jgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.jc{border-radius:14px;overflow:hidden;background:#e8e6f5;cursor:pointer;transition:all .2s;position:relative}
.jc:hover{transform:scale(1.02)}
.jc .ji{height:115px;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#e0def5,#cccae8);overflow:hidden}
.jc .ji svg{max-width:88px;max-height:88px}
.jc .jn{padding:9px 10px;color:#2a1a5a;font-weight:800;font-size:12px}
.j-empty{text-align:center;margin-top:50px;color:var(--mu)}
.j-empty .je{font-size:50px;margin-bottom:12px}

/* TOAST */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--card2);border:1px solid rgba(124,58,237,.4);color:white;padding:10px 20px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;z-index:999;transition:transform .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{transform:translateX(-50%) translateY(0)}

/* SPLASH */
#splash{position:fixed;inset:0;background:linear-gradient(145deg,#1e0a4a,#3b0f8c);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;transition:opacity .5s}
.sp-star{font-size:56px;animation:spinstar 2s linear infinite}
@keyframes spinstar{0%{transform:rotate(0) scale(1)}50%{transform:rotate(180deg) scale(1.2)}100%{transform:rotate(360deg) scale(1)}}
.sp-title{font-size:44px;font-weight:900;color:#f0eeff;letter-spacing:-2px}
.sp-sub{font-size:14px;color:rgba(240,238,255,0.5);text-align:center}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="sp-star">✦</div>
  <div class="sp-title">Simply Draw</div>
  <p class="sp-sub">Aprende a dibujar paso a paso</p>
</div>

<div class="app" id="app" style="visibility:hidden">
  <nav class="side">
    <div class="av" id="sn-av">🐊</div>
    <button class="nb on" id="nb-cat" onclick="switchTab('catalog')">
      <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Dibujar
    </button>
    <button class="nb" id="nb-jour" onclick="switchTab('journal')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Diario
    </button>
  </nav>
  <div class="body" id="main-body">
    <!-- CATALOG -->
    <div id="tab-catalog" class="pad">
      <div style="font-size:19px;font-weight:900;margin-bottom:13px">¿Qué quieres dibujar?</div>
      <div class="srch-w">
        <input class="srch" id="srch" placeholder="🔍  Busca un dibujo..." oninput="onSearch(this.value)" onkeydown="if(event.key==='Enter')doSearch()">
        <button class="srch-btn" onclick="doSearch()">🔍</button>
      </div>
      <!-- AI GENERATOR PANEL -->
      <div class="ai-box" id="ai-box">
        <div class="ai-lbl">✦ Generador IA — No está en el catálogo</div>
        <div class="ai-desc">Describe lo que quieres dibujar y la IA creará un tutorial con ilustraciones paso a paso.</div>
        <div class="ai-row">
          <input class="ai-in" id="ai-in" placeholder="Ej: elefante, cohete, fresa kawaii..." onkeydown="if(event.key==='Enter')genAI()">
          <button class="ai-btn" id="ai-btn" onclick="genAI()">
            <span id="ai-btn-icon">✦</span> Generar
          </button>
        </div>
        <div class="ai-status" id="ai-status" style="display:none">
          <div class="spin"></div>
          <span>Creando tu tutorial con IA...</span>
        </div>
        <div class="ai-error" id="ai-error"></div>
      </div>
      <!-- LEVEL TABS -->
      <div class="lvls" id="lvls"></div>
      <!-- CATEGORY FILTERS -->
      <div class="cats" id="cats"></div>
      <!-- GRID -->
      <div class="grid" id="draw-grid"></div>
    </div>
    <!-- JOURNAL -->
    <div id="tab-journal" class="pad" style="display:none">
      <div style="font-size:19px;font-weight:900;margin-bottom:14px">Mi Diario</div>
      <div class="jgrid" id="jgrid"></div>
      <div class="j-empty" id="j-empty"><div class="je">📓</div><p style="font-size:13px;line-height:1.5">Completa tu primer dibujo<br>para verlo aquí</p></div>
    </div>
    <div id="lesson-screen" class="lesson" style="display:none"></div>
  </div>
</div>
<div id="toast"></div>

<script>
// ============================================================
// ⚠️  CAMBIA ESTA URL POR LA DE TU RAILWAY DESPUÉS DE DESPLEGAR
// ============================================================
const RAILWAY_URL = 'https://web-production-1ad72.up.railway.app/generate';

// ============================================================
// SVG HELPERS
// ============================================================
const C={ol:'#2c1a5e',li:'#9b8ec4',mi:'#6b5ca0',tl:'#14b8a6',ye:'#fbbf24',pi:'#f472b6'};
const s=(w=2,c=C.ol)=>`stroke="${c}" stroke-width="${w}" fill="none" stroke-linecap="round" stroke-linejoin="round"`;
const sf=(f,sc=C.ol,w=2)=>`stroke="${sc}" stroke-width="${w}" fill="${f}" stroke-linecap="round" stroke-linejoin="round"`;
const ds=(c=C.tl)=>` stroke="${c}" stroke-dasharray="8 3"`;

// ============================================================
// DRAWINGS DATABASE — 30+ dibujos con SVG completo
// ============================================================
const DB=[
  {id:1,name:"Gatito",cat:"Animales",level:"F\u00e1cil",emoji:"\ud83d\udc31",steps:[
    {
      name:"Cabeza",
      hint:"Dibuja un <b>c\u00edrculo grande</b> en el centro",
      svg:`<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="108" r="65" stroke="#14b8a6" stroke-width="3" fill="none" stroke-dasharray="8 3"/></svg>`
    },
    {
      name:"Orejas",
      hint:"Dos <b>tri\u00e1ngulos puntiagudos</b> arriba",
      svg:`<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="108" r="62" stroke="#2c1a5e" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/><polygon points="60,58 42,18 84,46" stroke="#14b8a6" stroke-width="3" fill="none" stroke-dasharray="8 3"/><polygon points="140,58 158,18 116,46" stroke="#14b8a6" stroke-width="3" fill="none" stroke-dasharray="8 3"/></svg>`
    },
    {
      name:"Ojos",
      hint:"Ojos redondos con <b>brillo blanco</b>",
      svg:`<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="108" r="62" stroke="#2c1a5e" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/><polygon points="60,58 42,18 84,46" stroke="#2c1a5e" stroke-width="2.5" fill="#f9a8d4" stroke-linecap="round" stroke-linejoin="round"/><polygon points="140,58 158,18 116,46" stroke="#2c1a5e" stroke-width="2.5" fill="#f9a8d4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="78" cy="96" r="14" stroke="#14b8a6" stroke-width="3" fill="#2c1a5e" stroke-dasharray="5 2"/><circle cx="122" cy="96" r="14" stroke="#14b8a6" stroke-width="3" fill="#2c1a5e" stroke-dasharray="5 2"/><circle cx="83" cy="91" r="4" fill="white"/><circle cx="127" cy="91" r="4" fill="white"/></svg>`
    },
    {
      name:"Nariz",
      hint:"Nariz triangular + <b>bigotes largos</b>",
      svg:`<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="108" r="62" stroke="#2c1a5e" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/><polygon points="60,58 42,18 84,46" stroke="#2c1a5e" stroke-width="2" fill="#f9a8d4" stroke-linecap="round" stroke-linejoin="round"/><polygon points="140,58 158,18 116,46" stroke="#2c1a5e" stroke-width="2" fill="#f9a8d4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="78" cy="96" r="14" stroke="#2c1a5e" stroke-width="2" fill="#2c1a5e" stroke-linecap="round" stroke-linejoin="round"/><circle cx="122" cy="96" r="14" stroke="#2c1a5e" stroke-width="2" fill="#2c1a5e" stroke-linecap="round" stroke-linejoin="round"/><circle cx="83" cy="91" r="4" fill="white"/><circle cx="127" cy="91" r="4" fill="white"/><polygon points="100,116 93,126 107,126" stroke="#14b8a6" stroke-width="2.5" fill="#f472b6" stroke-dasharray="4 2"/><path d="M88,130 Q100,142 112,130" stroke="#14b8a6" stroke-width="2.5" fill="none" stroke-dasharray="4 2"/><line x1="36" y1="117" x2="82" y2="121" stroke="#14b8a6" stroke-width="1.5" stroke-dasharray="3 2"/><line x1="118" y1="121" x2="164" y2="117" stroke="#14b8a6" stroke-width="1.5" stroke-dasharray="3 2"/></svg>`
    },
    {

// ============================================================
// APP STATE
// ============================================================
const LEVELS=['Todo','Fácil','Medio','Difícil','Experto'];
const CATS_LIST=['Todo','Animales','Naturaleza','Fantástico','Mar','Construcciones','Vehículos','Comida','Objetos','Personas'];

const ST={
  tab:'catalog', lvl:'Todo', cat:'Todo', q:'',
  lesson:null, step:0, done:[], aiLessons:[],
  busy:false
};

// ============================================================
// INIT
// ============================================================
window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('splash').style.opacity='0';
    setTimeout(()=>{
      document.getElementById('splash').style.display='none';
      document.getElementById('app').style.visibility='visible';
    },500);
  },1800);
  buildLvls();
  buildCats();
  renderCatalog();
});

// ============================================================
// NAV
// ============================================================
function switchTab(t){
  ST.tab=t;
  ['catalog','journal'].forEach(x=>{
    document.getElementById('tab-'+x).style.display=x===t?'block':'none';
    document.getElementById('nb-'+(x==='catalog'?'cat':'jour')).classList.toggle('on',x===t);
  });
  if(t==='journal') renderJournal();
}

// ============================================================
// FILTERS
// ============================================================
function buildLvls(){
  const el=document.getElementById('lvls');el.innerHTML='';
  LEVELS.forEach(v=>{
    const b=document.createElement('button');
    b.className='lv'+(v==='Todo'?' on':'');b.dataset.v=v;
    b.textContent=v==='Todo'?'✦ Todo':v;
    b.onclick=()=>{
      document.querySelectorAll('.lv').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');ST.lvl=v;ST.cat='Todo';
      document.querySelectorAll('.ct').forEach(x=>x.classList.remove('on'));
      document.querySelector('.ct').classList.add('on');
      renderCatalog();
    };
    el.appendChild(b);
  });
}

function buildCats(){
  const el=document.getElementById('cats');el.innerHTML='';
  CATS_LIST.forEach((c,i)=>{
    const b=document.createElement('button');
    b.className='ct'+(i===0?' on':'');b.textContent=c;
    b.onclick=()=>{
      document.querySelectorAll('.ct').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');ST.cat=c;renderCatalog();
    };
    el.appendChild(b);
  });
}

// ============================================================
// SEARCH
// ============================================================
function onSearch(q){ST.q=q.toLowerCase().trim();renderCatalog()}
function doSearch(){ST.q=document.getElementById('srch').value.toLowerCase().trim();renderCatalog()}

function getList(){
  let all=[...DB,...ST.aiLessons];
  if(ST.lvl!=='Todo') all=all.filter(d=>d.level===ST.lvl);
  if(ST.cat!=='Todo') all=all.filter(d=>d.cat===ST.cat);
  if(ST.q) all=all.filter(d=>
    d.name.toLowerCase().includes(ST.q)||
    d.cat.toLowerCase().includes(ST.q)||
    d.emoji.includes(ST.q)
  );
  return all;
}

// ============================================================
// CATALOG RENDER
// ============================================================
function lvClass(l){return{Fácil:'bf',Medio:'bm',Difícil:'bd2',Experto:'be'}[l]||'bf'}

function getThumb(d){
  if(!d.steps||!d.steps.length) return `<span style="font-size:48px;line-height:1">${d.emoji}</span>`;
  return d.steps[d.steps.length-1].svg;
}

function renderCatalog(){
  const list=getList();
  const grid=document.getElementById('draw-grid');
  const aiBox=document.getElementById('ai-box');
  const aiErr=document.getElementById('ai-error');
  aiErr.style.display='none';

  // Show AI panel when search has no results
  if(ST.q&&!list.length){
    aiBox.style.display='block';
    document.getElementById('ai-in').value=ST.q;
  } else {
    aiBox.style.display='none';
  }

  grid.innerHTML='';

  if(!list.length){
    grid.innerHTML=`<div class="empty"><div class="ei">🔍</div><p>No encontramos "<b>${ST.q}</b>"<br>¡Usa el generador IA de arriba!</p></div>`;
    return;
  }

  // Group by level when showing all
  if(ST.lvl==='Todo'&&ST.cat==='Todo'&&!ST.q){
    const colors={Fácil:'#16a34a',Medio:'#d97706',Difícil:'#dc2626',Experto:'#7c3aed'};
    LEVELS.filter(l=>l!=='Todo').forEach(lv=>{
      const gr=list.filter(d=>d.level===lv);if(!gr.length)return;
      const h=document.createElement('div');h.className='sh';
      h.innerHTML=`<span style="color:${colors[lv]}">${lv}</span>`;
      grid.appendChild(h);
      gr.forEach(d=>grid.appendChild(makeCard(d)));
    });
  } else {
    list.forEach(d=>grid.appendChild(makeCard(d)));
  }
}

function makeCard(d){
  const isDone=ST.done.some(c=>c.id===d.id);
  const c=document.createElement('div');
  c.className='dc';
  c.innerHTML=`
    <div class="dc-img">${getThumb(d)}</div>
    <div class="dc-body">
      <div class="dc-name">${d.emoji} ${d.name}</div>
      <div class="dc-meta">
        <span class="bv ${lvClass(d.level)}">${d.level}</span>
        <span class="dc-s">${d.steps.length} pasos</span>
        ${d.aiGenerated?'<span style="font-size:9px;color:#a78bfa">✦IA</span>':''}
      </div>
    </div>
    ${isDone?'<div class="done-b">✓</div>':''}
    ${d.aiGenerated?'<div class="ai-b">IA</div>':''}`;
  c.onclick=()=>openLesson(d);
  return c;
}

// ============================================================
// AI GENERATOR — llama a Railway
// ============================================================
async function genAI(){
  if(ST.busy)return;
  const subject=(document.getElementById('ai-in').value.trim()||ST.q);
  if(!subject)return;

  ST.busy=true;
  const btn=document.getElementById('ai-btn');
  const icon=document.getElementById('ai-btn-icon');
  const status=document.getElementById('ai-status');
  const errDiv=document.getElementById('ai-error');

  btn.disabled=true;
  icon.innerHTML='<div class="spin"></div>';
  status.style.display='flex';
  errDiv.style.display='none';

  try{
    const resp=await fetch(RAILWAY_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({subject})
    });

    if(!resp.ok){
      const e=await resp.json();
      throw new Error(e.error||'Error del servidor');
    }

    const parsed=await resp.json();

    const lesson={
      id:Date.now(),
      name:parsed.name,
      emoji:parsed.emoji||'🎨',
      cat:parsed.cat||'Objetos',
      level:parsed.level||'Fácil',
      steps:parsed.steps||[],
      aiGenerated:true,
    };

    ST.aiLessons.unshift(lesson);
    document.getElementById('ai-box').style.display='none';
    document.getElementById('srch').value='';
    ST.q='';
    renderCatalog();
    toast(`✦ Tutorial "${lesson.name}" generado con IA`);

  }catch(e){
    errDiv.textContent='Error: '+e.message+'. Comprueba que Railway está activo.';
    errDiv.style.display='block';
  }finally{
    ST.busy=false;
    btn.disabled=false;
    icon.textContent='✦';
    status.style.display='none';
  }
}

// Enter key on AI input
document.getElementById('ai-in').addEventListener('keydown',e=>{if(e.key==='Enter')genAI()});
document.getElementById('srch').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});

// ============================================================
// LESSON
// ============================================================
function openLesson(d){
  ST.lesson=d; ST.step=0;
  const scr=document.getElementById('lesson-screen');
  scr.style.display='flex';
  scr.innerHTML=`
    <div class="lhdr">
      <button class="lbk" onclick="closeLesson()">←</button>
      <h2>${d.emoji} ${d.name}</h2>
      <span id="l-av" style="font-size:24px">🐊</span>
    </div>
    <div class="srow" id="srow"></div>
    <div class="dots" id="sdots"></div>
    <div class="lcont" id="lcont"></div>
    <div class="lfoot">
      <div class="scl" id="scl"></div>
      <button class="btn-n" id="btn-n" onclick="nextStep()">SIGUIENTE PASO →</button>
    </div>`;
  buildStepsRow();renderStep();
}

function closeLesson(){document.getElementById('lesson-screen').style.display='none'}

function buildStepsRow(){
  const row=document.getElementById('srow');row.innerHTML='';
  const dots=document.getElementById('sdots');dots.innerHTML='';
  ST.lesson.steps.forEach((st,i)=>{
    const cls=i<ST.step?'dn':i===ST.step?'cr':'';
    const n=document.createElement('div');
    n.className='sn'+(cls?' '+cls:'');
    n.innerHTML=`<div class="sc ${cls}">${i<ST.step?'✓':i+1}</div><div class="sl">${st.name}</div>`;
    n.onclick=()=>{ST.step=i;renderStep();buildStepsRow()};
    if(i>0)n.style.marginLeft='40px';
    row.appendChild(n);
    const dot=document.createElement('div');
    dot.className='dot'+(i<ST.step?' dn':i===ST.step?' cr':'');
    dots.appendChild(dot);
  });
  setTimeout(()=>{
    const c=row.querySelector('.sn.cr');
    if(c)c.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  },80);
}

function renderStep(){
  const d=ST.lesson,st=d.steps[ST.step],isLast=ST.step===d.steps.length-1;
  document.getElementById('scl').textContent=`Paso ${ST.step+1} de ${d.steps.length}`;
  document.getElementById('lcont').innerHTML=`
    <div class="vc">
      <div class="sbg">${ST.step+1}</div>
      <div class="snb">${st.name}</div>
      <div class="vsvg">${st.svg}</div>
      <div class="vhint">
        <div class="hi">${isLast?'🎉':'✏️'}</div>
        <div class="ht">${st.hint}</div>
      </div>
    </div>`;
  const btn=document.getElementById('btn-n');
  btn.textContent=isLast?'✓ ¡Completar dibujo!':'SIGUIENTE PASO →';
  btn.className='btn-n'+(isLast?' btn-f':'');
  document.getElementById('lcont').scrollTop=0;
}

function nextStep(){
  const isLast=ST.step===ST.lesson.steps.length-1;
  if(isLast){showDone();return}
  ST.step++;buildStepsRow();renderStep();
}

// ============================================================
// DONE
// ============================================================
function showDone(){
  const scr=document.getElementById('lesson-screen');
  const ov=document.createElement('div');ov.className='done-ov';
  ov.innerHTML=`
    <div class="do-em">🎉</div>
    <div class="do-t">¡Dibujo completado!</div>
    <p class="do-s">¡Increíble! Has dibujado "${ST.lesson.name}"<br>en ${ST.lesson.steps.length} pasos.</p>
    <div class="do-bs">
      <button class="bdo1" onclick="saveDiary()">💾 Guardar en Diario</button>
      <button class="bdo2" onclick="closeLesson()">Elegir otro dibujo</button>
    </div>`;
  scr.appendChild(ov);
}

function saveDiary(){
  if(!ST.done.find(c=>c.id===ST.lesson.id)) ST.done.push(ST.lesson);
  closeLesson();renderCatalog();
  toast('🎉 ¡Guardado en tu Diario!');
}

function closeDone(){
  document.querySelector('.done-ov')?.remove();
  closeLesson();
}

// ============================================================
// JOURNAL
// ============================================================
function renderJournal(){
  const g=document.getElementById('jgrid');
  const e=document.getElementById('j-empty');
  g.innerHTML='';
  if(!ST.done.length){e.style.display='block';return}
  e.style.display='none';
  ST.done.forEach(d=>{
    const c=document.createElement('div');c.className='jc';
    c.innerHTML=`<div class="ji">${getThumb(d)}</div><div class="jn">${d.emoji} ${d.name}</div>`;
    c.onclick=()=>openLesson(d);
    g.appendChild(c);
  });
}

// ============================================================
// TOAST
// ============================================================
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>t.classList.remove('show'),2400);
}
